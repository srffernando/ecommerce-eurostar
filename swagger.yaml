openapi: 3.0.3
info:
  title: E-Commerce Eurostar API
  description: |
    REST API for e-commerce with JWT authentication and checkout.

    **Checkout rules:**
    - Only authenticated users can checkout
    - Payment methods: `cash` or `credit_card`
    - Cash payments receive a 10% discount on the subtotal
  version: 1.0.0

servers:
  - url: http://localhost:5432/api
    description: Local development server

tags:
  - name: Health
    description: Server health
  - name: Auth
    description: User registration and login
  - name: Checkout
    description: Order checkout (authenticated)

paths:
  /healthcheck:
    get:
      tags:
        - Health
      summary: Healthcheck
      description: Verify the API is running.
      operationId: healthcheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /register:
    post:
      tags:
        - Auth
      summary: Register
      description: Create a new user account and receive a JWT token.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: dave
              email: dave@example.com
              password: mypassword
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticate with email and password to receive a JWT token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: alice@example.com
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /checkout:
    post:
      tags:
        - Checkout
      summary: Checkout
      description: |
        Place an order. Requires a valid JWT.

        - `cash` — 10% discount applied to subtotal
        - `credit_card` — no discount
      operationId: checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            example:
              items:
                - productId: 1
                  quantity: 2
                - productId: 3
                  quantity: 1
              paymentMethod: cash
      responses:
        '200':
          description: Checkout completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Invalid request body or payment method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT obtained from `/login` or `/register`

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: dave
        email:
          type: string
          format: email
          example: dave@example.com
        password:
          type: string
          format: password
          example: mypassword

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          example: password123

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: alice
        email:
          type: string
          format: email
          example: alice@example.com

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT access token

    CheckoutItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    CheckoutRequest:
      type: object
      required:
        - items
        - paymentMethod
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItemRequest'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
          example: cash

    CheckoutLineItem:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        name:
          type: string
          example: Wireless Headphones
        unitPrice:
          type: number
          format: float
          example: 79.99
        quantity:
          type: integer
          example: 2
        lineTotal:
          type: number
          format: float
          example: 159.98

    CheckoutResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutLineItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
        subtotal:
          type: number
          format: float
          example: 194.97
        discount:
          type: number
          format: float
          example: 19.5
        total:
          type: number
          format: float
          example: 175.47

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Invalid email or password
